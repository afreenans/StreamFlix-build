name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/streamflix-ui .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/streamflix-ui

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/streamflix-ui

            # Stop and remove container if exists
            docker stop streamflix-ui || true
            docker rm streamflix-ui || true

            # Free port 80 if anything else is using it
            docker stop $(docker ps -q --filter "publish=80") || true
            docker rm $(docker ps -aq --filter "publish=80") || true

            # Run new container
            docker run -d -p 80:80 --restart always --name streamflix-ui ${{ secrets.DOCKER_USERNAME }}/streamflix-ui
