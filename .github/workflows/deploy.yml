name: StreamFlix CI/CD

on:
push:
branches:
- main

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest
outputs:
version: ${{ steps.version.outputs.version }}

```
steps:
  - uses: actions/checkout@v4

  - name: Generate version
    id: version
    run: |
      VERSION="$(date +%Y.%m.%d).${{ github.run_number }}"
      echo "version=$VERSION" >> $GITHUB_OUTPUT
```

package:
runs-on: ubuntu-latest
needs: build

```
steps:
  - uses: actions/checkout@v4

  - name: Validate files
    run: |
      echo "Checking files..."
      ls -la

  - name: Create archive
    run: |
      mkdir -p dist
      tar -czf "dist/streamflix-${{ needs.build.outputs.version }}.tar.gz" .

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: streamflix-${{ needs.build.outputs.version }}
      path: dist/streamflix-${{ needs.build.outputs.version }}.tar.gz
```

release:
runs-on: ubuntu-latest
needs: [build, package]

```
steps:
  - uses: actions/download-artifact@v4
    with:
      name: streamflix-${{ needs.build.outputs.version }}
      path: release

  - name: Create Release
    uses: ncipollo/release-action@v1
    with:
      tag: v${{ needs.build.outputs.version }}
      name: v${{ needs.build.outputs.version }}
      artifacts: release/streamflix-${{ needs.build.outputs.version }}.tar.gz
      token: ${{ secrets.GITHUB_TOKEN }}
```

